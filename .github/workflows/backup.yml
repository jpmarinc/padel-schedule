name: Supabase Weekly Backup

on:
  schedule:
    - cron: '0 6 * * 2'   # Martes 6am UTC (lunes noche Argentina) — post partido
  workflow_dispatch:        # También ejecutable manualmente desde GitHub Actions

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4  # TODO jun-2026: migrar a versión con Node.js 24

      - name: Export Supabase tables
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p backups/$DATE

          for table in padel_players padel_seasons padel_matches padel_match_players padel_match_results; do
            curl -s \
              -H "apikey: $SUPABASE_KEY" \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              "$SUPABASE_URL/rest/v1/$table?select=*" \
              -o "backups/$DATE/$table.json"
            echo "✓ $table"
          done

          # Resumen
          echo "Backup $DATE:" > backups/$DATE/README.md
          for table in padel_players padel_seasons padel_matches padel_match_players padel_match_results; do
            COUNT=$(cat backups/$DATE/$table.json | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "?")
            echo "- $table: $COUNT registros" >> backups/$DATE/README.md
          done
          cat backups/$DATE/README.md

      - name: Commit backup
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "backup: $(date +%Y-%m-%d) — auto Supabase export"
          git push
